<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Research Synthesis</title>
    <link rel="stylesheet" href="../style.css" />
    <script src="../navigation.js" defer></script>
  </head>
  <body>
    <div>
      <section
        class="slide slide--split"
        style="position: relative; height: 100vh"

        <div class="h3" data-anim="fade-up" data-delay="0">

            <ul class="bullet-list" data-anim="fade-up" data-delay="0">

              <li class="body hidden">Inverse dynamics formulation</li>

                Equality constraints for the underactuation

                Solved through Sequential Quadratic Programming (SQP)

        <footer class="slide-footer"></footer>

        <div id="slide-counter">14</div>
      </section>
