<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Research Synthesis</title>
    <link rel="stylesheet" href="../style.css" />
    <script src="../navigation.js" defer></script>
  </head>
  <body>
    <div>
      <section
        class="slide slide--split"
        style="position: relative; height: 100vh"
      >
        <header class="slide-header">
          <span class="label muted"
            >Towards Massively Parallel Motion Planning with Inverse
            Dynamics</span
          >
          <span class="label muted">04. Experiments</span>
        </header>

        <div class="h3" data-anim="fade-up" data-delay="0">
          Scalability against SOTA solver
        </div>
        <div class="slide--split-body">
          <div class="split-text" data-anim="fade-up" data-delay="0">
            <img width="90%" src="media/plots/sqp_times.svg" />
          </div>
          <div class="split-text">
            <ul class="bullet-list">
              <li class="body hidden">
                Comparison with a JAX-based SQP solver (forward dynamics only).
              </li>
              <li class="body hidden">
                JAX-based solver did not scale well. XLA vectorizations very
                prone to code structure.
              </li>
            </ul>
          </div>
        </div>

        <footer class="slide-footer"></footer>

        <div id="slide-counter">27</div>
      </section>
    </div>
  </body>
</html>
